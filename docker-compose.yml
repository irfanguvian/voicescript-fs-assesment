# Court Reporting Workflow Manager — local stack.
# Default `docker compose up` brings only Postgres (for local dev of the apps).
# Use `docker compose --profile full up --build` to also build/run backend + frontend.

services:
  postgres:
    image: postgres:16-alpine
    container_name: court-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: courtuser
      POSTGRES_PASSWORD: courtpass
      POSTGRES_DB: courtdb
    # Host port 5433 (container stays 5432) to avoid clashing with a local
    # Postgres that may already own 5432. App connects via localhost:5433.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtuser -d courtdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles: ["full"]
    build:
      context: ./backend
    container_name: court-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://courtuser:courtpass@postgres:5432/courtdb?schema=public"
      PORT: "3000"
      REPORTER_RATE_PER_MINUTE: "2000"
      EDITOR_FLAT_FEE: "50000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
    container_name: court-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
